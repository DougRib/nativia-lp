<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Favicon servido a partir de /public — o Vite copia arquivos de /public
      para a raiz do build, então caminhos absolutos como "/favicon.svg" funcionam
      tanto em dev quanto em produção. Evita o bug anterior em que "src/assets/..."
      retornava 404 após o `vite build`.
    -->
    <link rel="icon" type="image/svg+xml" href="/src/assets/nativia-icon.png" />

    <!-- URL canônica: evita duplicidade em buscadores quando a página é acessada por variações de domínio. -->
    <link rel="canonical" href="https://nativia-lp.vercel.app/" />

    <!--
      Preconnect às origens das fontes do Google: abre o handshake TCP/TLS
      antecipadamente, reduzindo o tempo até as fontes estarem disponíveis (LCP).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    />

    <title>NativIA | IA Corporativa Privada On-premise</title>
    <meta
      name="description"
      content="NativIA: plataforma de IA corporativa privada para análise inteligente de documentos com execução on-premise, segurança e conformidade LGPD."
    />

    <!-- Open Graph (LinkedIn, WhatsApp, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NativIA" />
    <meta property="og:url" content="https://nativia-lp.vercel.app/" />
    <meta property="og:title" content="NativIA | IA Corporativa Privada" />
    <meta
      property="og:description"
      content="Análise de documentos com IA privada e segura dentro da sua infraestrutura."
    />
    <!--
      TODO: Gerar uma imagem 1200x630 em /public/og-image.jpg para preview de compartilhamento.
      Enquanto não existe, mantém-se o fallback automático do Vercel.
    -->
    <meta property="og:image" content="https://nativia-lp.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NativIA | IA Corporativa Privada" />
    <meta
      name="twitter:description"
      content="Análise de documentos com IA privada e segura dentro da sua infraestrutura."
    />
    <meta name="twitter:image" content="https://nativia-lp.vercel.app/og-image.jpg" />

    <meta name="theme-color" content="#0a1a2e" />

    <!--
      JSON-LD: dados estruturados que ajudam buscadores e cards corporativos
      (ex.: LinkedIn) a identificar o produto e a empresa. Usa SoftwareApplication
      por se tratar de uma plataforma SaaS / on-premise.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "NativIA",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Linux, Docker",
        "description": "Plataforma de IA corporativa privada para análise inteligente de documentos com execução on-premise.",
        "url": "https://nativia-lp.vercel.app/",
        "offers": {
          "@type": "Offer",
          "priceCurrency": "BRL",
          "price": "0",
          "availability": "https://schema.org/InStock"
        },
        "publisher": {
          "@type": "Organization",
          "name": "NativIA",
          "url": "https://nativia-lp.vercel.app/"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
