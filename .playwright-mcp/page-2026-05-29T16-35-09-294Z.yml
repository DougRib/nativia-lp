    - main [ref=e19]:
      - generic [ref=e20]:
        - paragraph [ref=e21]: Documento institucional
        - heading "Programa LGPD e Proteção de Dados" [level=1] [ref=e22]
        - paragraph [ref=e23]: A NativIA adota um programa contínuo de privacidade e proteção de dados para assegurar conformidade com a LGPD, reduzir riscos e fortalecer a confiança no uso corporativo de inteligência artificial.
        - paragraph [ref=e24]:
          - text: "Última atualização:"
          - strong [ref=e25]: 28 de maio de 2026
      - generic [ref=e26]:
        - article [ref=e27]:
          - heading "1. Compromisso institucional" [level=2] [ref=e28]
          - generic [ref=e29]:
            - paragraph [ref=e30]: Privacidade e segurança são princípios estruturantes do produto e da operação. Nosso programa considera requisitos legais, políticas internas e melhores práticas de governança de dados.
            - paragraph [ref=e31]: A conformidade é tratada como processo contínuo, com revisão periódica de controles, processos e responsabilidades.
        - article [ref=e32]:
          - heading "2. Papéis de tratamento" [level=2] [ref=e33]
          - generic [ref=e34]:
            - paragraph [ref=e35]: Dependendo do contexto, a NativIA pode atuar como controladora de dados relacionados a seus canais institucionais e como operadora em tratamentos realizados em nome de clientes corporativos.
            - paragraph [ref=e36]: As responsabilidades de cada parte são formalizadas em instrumentos contratuais e anexos de proteção de dados.
        - article [ref=e37]:
          - heading "3. Princípios aplicados" [level=2] [ref=e38]
          - paragraph [ref=e40]: Nossas atividades de tratamento observam os princípios de finalidade, adequação, necessidade, livre acesso, qualidade dos dados, transparência, segurança, prevenção, não discriminação e responsabilização.
        - article [ref=e41]:
          - heading "4. Medidas técnicas e organizacionais" [level=2] [ref=e42]
          - generic [ref=e43]:
            - paragraph [ref=e44]: Adotamos controles de acesso por usuário e grupo, segregação de ambientes, criptografia de comunicações em trânsito (TLS), trilhas de auditoria com persistência por conversa, monitoramento de eventos, gestão de vulnerabilidades e políticas internas de segurança da informação.
            - paragraph [ref=e45]: A autenticação utiliza Keycloak com SSO (SAML/OIDC) e integração com diretórios LDAP/Active Directory. Os modelos de IA — LLM, embeddings, reranker, OCR/imagem e transcrição de áudio — rodam localmente na infraestrutura do cliente, sem chamadas para serviços públicos de IA durante a inferência.
            - paragraph [ref=e46]: A plataforma oferece um fluxo de exclusão completa de conta diretamente na interface, que remove dados pessoais, documentos enviados, índices vetoriais, histórico de conversas e arquivos do usuário.
            - paragraph [ref=e47]: Também realizamos treinamentos internos, revisão de perfis de acesso e avaliação de fornecedores com impacto em dados pessoais.
        - article [ref=e48]:
          - heading "5. Direitos dos titulares e atendimento" [level=2] [ref=e49]
          - generic [ref=e50]:
            - paragraph [ref=e51]: Mantemos processo dedicado para recebimento e tratamento de solicitações de titulares, em conformidade com os direitos previstos na LGPD.
            - paragraph [ref=e52]: As demandas são tratadas com critérios de autenticidade, rastreabilidade, prazo e proporcionalidade, respeitando limites legais e contratuais.
        - article [ref=e53]:
          - heading "6. Gestão de incidentes" [level=2] [ref=e54]
          - generic [ref=e55]:
            - paragraph [ref=e56]: Possuímos fluxo interno para identificação, contenção, investigação e resposta a incidentes de segurança com potencial impacto em dados pessoais.
            - paragraph [ref=e57]: Quando exigido por lei, adotamos comunicação aos envolvidos e autoridades competentes, incluindo medidas de mitigação e melhoria contínua.
        - article [ref=e58]:
          - heading "7. Relacionamento com clientes e parceiros" [level=2] [ref=e59]
          - generic [ref=e60]:
            - paragraph [ref=e61]: Nos contratos com clientes e parceiros, definimos cláusulas de proteção de dados, confidencialidade, segurança e cooperação para atendimento a direitos de titulares e obrigações regulatórias.
            - paragraph [ref=e62]: Para integrações e operações conjuntas, avaliamos riscos e estabelecemos controles proporcionais à criticidade do tratamento.
        - article [ref=e63]:
          - heading "8. Canal de privacidade e encarregado" [level=2] [ref=e64]
          - generic [ref=e65]:
            - paragraph [ref=e66]: Em atendimento ao art. 41 da LGPD, a NativIA indica seu Encarregado pelo Tratamento de Dados Pessoais (DPO), responsável por intermediar comunicações com titulares e com a Autoridade Nacional de Proteção de Dados.
            - paragraph [ref=e67]: Dúvidas sobre tratamento de dados, solicitações de titulares e comunicações relacionadas à LGPD podem ser encaminhadas pelos canais oficiais abaixo.
